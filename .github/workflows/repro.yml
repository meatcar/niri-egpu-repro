name: repro

on:
  push:
  workflow_dispatch:
  schedule:
    # weekly against fresh niri main: red while the bug exists,
    # self-disables once upstream fixes it
    - cron: "0 6 * * 1"

# force shell to be `bash -eo pipefail`, see:
# https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#defaultsrunshell
defaults:
  run:
    shell: bash

jobs:
  repro:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # KVM is available by default on public-repo runners
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31

      - name: Track upstream
        run: |
          nix flake update
          nix flake metadata --json \
            | jq -r '"tested niri rev: " + .locks.nodes.niri.locked.rev' \
            >> "$GITHUB_STEP_SUMMARY"

      # fails while the bug is present; that red run IS the repro
      - name: Build repro check
        run: nix build .#checks.x86_64-linux.repro -L 2>&1 | tee build.log

      # debug bundle for upstream: exact inputs + driver log with niri trace
      - name: Export debug artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: repro-debug-${{ github.run_id }}
          path: |
            build.log
            flake.lock

      # only reached when the check passes, i.e. the bug is fixed upstream
      - name: Retire tripwire
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::notice::fixed upstream, our job is done."
          gh workflow disable repro.yml

      - name: Diagnose
        if: failure()
        run: |
          if grep -q "error creating DrmNode'.* unexpectedly succeeded" build.log; then
            echo "::notice::bug reproduced! niri failed to resolve the removed device."
          else
            echo "::warning::couldn't reproduce the bug. Problem with the test?"
          fi
